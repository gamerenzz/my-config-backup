name: 定时抓取配置文件

on:
  schedule:
    # 每 6 小时运行一次 (UTC 时间)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 运行抓取脚本
        run: |
          chmod +x fetch_configs.sh
          ./fetch_configs.sh

      - name: 提交并推送更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 只有在有变动时才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新配置: $(date)" && git push)
