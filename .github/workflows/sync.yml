name: 自动同步与转换

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时运行一次
  workflow_dispatch:      # 允许手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖
        run: pip install pyyaml

      - name: 执行下载脚本
        run: |
          chmod +x fetch_configs.sh
          ./fetch_configs.sh

      - name: 执行转换脚本
        run: python generate_clash.py

      - name: 提交并推送
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # 如果没有文件变动，则退出而不报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "更新节点: $(date)" && git push)
